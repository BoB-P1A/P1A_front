<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EPIA к°ңмқём •ліҙ нқҗлҰ„лҸ„</title>

    <!-- GoJS -->
    <script src="https://cdn.jsdelivr.net/npm/gojs@3.0.22/release/go.js"></script>
    <script src="https://gojs.net/latest/extensions/Figures.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        :root{
            --bg:#f5f7fa;
            --header:#2f6fb0;
            --header-text:#fff;
            --col-header:#e5e7eb;
            --grid:#cbd5e1;
            --border:#9ca3af;
            --leftcol:#eef2f7;

            --left-w:90px;    /* н–ү лқјлІЁ м—ҙ */
            --col-w:210px;     /* мҲҳм§‘/ліҙмң /... к°Ғ лӢЁкі„ м—ҙ л„“мқҙ */

            --cell-min-h:100px;

            --palette-w:160px;
            --layout-gap:10px;
            --pii-panel-w:180px;
        }

        *{box-sizing:border-box;}
        body{
            margin:0;
            background:var(--bg);
            font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
        }
        .page{
            max-width:1540px;      /* м „мІҙ нҸӯ */
            margin:16px auto;
            padding:10px;
        }

        .toolbar{
            margin:6px 0 12px 6px;
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }
        .toolbar button{
            padding:6px 10px;
            font-size:16px;
            line-height:1.3;
            cursor:pointer;
        }

        .frame{
            background:#fff;
            border:1.5px solid var(--border);
            border-radius:10px;
            position:relative;
            /* overflow:visible;  кё°ліём ҒмңјлЎң visible, мҠӨнҒ¬лЎӨ л§үмқҢ */
        }

        .bluebar{
            height:56px;
            background:var(--header);
            color:var(--header-text);
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:800;
            font-size:18px;
            border-top-left-radius:10px;
            border-top-right-radius:10px;
            flex-shrink:0;
        }

        /* ===== л©”мқё к°ҖлЎң л Ҳмқҙм•„мӣғ: [нҢ”л ҲнҠё] [к°ҖмҡҙлҚ° н‘ң+лӢӨмқҙм–ҙк·ёлһЁ] [PII нҢЁл„җ] */
        .main-row{
            display:flex;
            flex-direction:row;
            align-items:flex-start;
            justify-content:flex-start;
            gap:var(--layout-gap);
            padding:16px;
            /* мҠӨнҒ¬лЎӨ м ңкұ° */
            overflow:visible;
        }

        /* ===== нҢ”л ҲнҠё (мқҙм ң absolute м•„лӢҳ, к·ёлғҘ мІ« м»¬лҹјмңјлЎң мһҗлҰ¬ мһЎмқҢ) ===== */
        #paletteCol{
            flex:0 0 var(--palette-w);
            max-width:var(--palette-w);
            margin-left: -8px;
        }
        #palette{
            width:100%;
            border:1px solid #bbb;
            background:#f8f9fb;
            border-radius:8px;
            box-shadow:0 4px 12px rgba(0,0,0,.08);
            height:600px;

            /* мҠӨнҒ¬лЎӨ м ңкұ° */
            overflow:hidden;
        }

        /* ===== к°ҖмҡҙлҚ° н‘ң м»Ён…Ңмқҙл„Ҳ ===== */
        #tableWrapOuter{
            position:relative;
            flex:0 0 auto;
        }
        .tableHeader{
            display:grid;
            grid-template-columns: var(--left-w) repeat(5, var(--col-w));
            border-bottom:1px solid var(--grid);
            background:var(--col-header);
            font-weight:700;
            font-size:16px;
        }
        .tableHeader>div{
            padding:10px 12px;
            border-right:1px solid var(--grid);
            text-align:center;
            white-space:pre-line;   /* вҶҗ \n мӨ„л°”кҝҲ мқёмӢқ */
        }
        .tableHeader>div:last-child{border-right:none}

        /* мӢӨм ң н‘ң мҳҒм—ӯ */
        #gridWrap{
            position:relative;
            border:1px solid var(--grid);
            border-top:none;
            background:#fff;
            /* мҠӨнҒ¬лЎӨ м ңкұ° */
            overflow:visible;
        }

        #tableGrid{
            display:grid;
            grid-template-columns: var(--left-w) repeat(5, var(--col-w));
            font-size:16px;
            line-height:1.35;
        }

        /* кіөнҶө м…Җ */
        .cell{
            min-height:var(--cell-min-h);
            border-right:1px solid var(--grid);
            border-bottom:1px solid var(--grid);
            padding:4px;
            position:relative;
        }
        .cell:nth-child(6n){ border-right:none; } /* 6м—ҙл§ҲлӢӨ лҒҠкё° (лқјлІЁм—ҙ+5лӢЁкі„=6м№ё) */

        .rowlabel{
            background:var(--leftcol);
            font-weight:700;
            display:flex;
            align-items:center;
            justify-content:center;
            white-space:pre-line;
            text-align:center;
            font-size:16px;
        }

        /* textarea кіөнҶө */
        .cell textarea{
            width: 100%;
            height: auto;           /* scrollHeightлЎң нӮӨмӣҖ */
            min-height: 0;          /* кі м •к°’ м ңкұ° */
            border: none;
            background: transparent;
            resize: none;           /* мӮ¬мҡ©мһҗ л“ңлһҳк·ё кёҲм§Җ */
            overflow: hidden;       /* лӮҙл¶Җ мҠӨнҒ¬лЎӨ м ңкұ° */
            font-size: 16px;
            line-height: 1.35;
            /*font-family: inherit;*/
            white-space: pre-wrap;
            word-break: break-word;
            padding: 4px 6px;
            box-sizing: border-box;
        }
        .cell textarea:focus{
            outline:1px solid #60a5fa;
        }

        /* мІҳлҰ¬нқҗлҰ„ м№ё */
        .flowcell textarea{
            font-weight:500;
        }

        /* лӢЁкі„ м„ӨлӘ… м№ё н–ү мһҗмІҙлҸ„ н…ҚмҠӨнҠё лҶ’мқҙм—җ л§һм¶° лҠҳм–ҙлӮҳкІҢ */
        .descRow {
            align-items: stretch;
            min-height: 0 !important;      /* flex/grid л¶ҖлӘЁмқҳ overflow л°©м§Җ н•өмӢ¬ */
            height: auto !important;
            overflow: visible !important;
        }

        /* ===== GoJS лӢӨмқҙм–ҙк·ёлһЁ мҳӨлІ„л Ҳмқҙ (н‘ң мң„м—җ кІ№м№Ё) ===== */
        #diagramOverlay{
            position:absolute;
            /* мқҙ мҳҒм—ӯмқҖ мҲҳм§‘~нҢҢкё° 5м—ҙ л¶Җл¶„ м „мІҙ лҚ®лҸ„лЎқ кі„мӮ°н•ҙм„ң JSм—җм„ң лҰ¬мӮ¬мқҙмҰҲ */
            left:0;
            top:0;
            right:0;
            bottom:0;
            background:transparent;
            pointer-events:auto;
            border:none;
            z-index:10;
        }

        /* ===== мҳӨлҘёмӘҪ мІҳлҰ¬ к°ңмқём •ліҙ нҢЁл„җ ===== */
        #piiPanel{
            flex:0 0 auto;
            width:var(--pii-panel-w);
            border:1px solid var(--border);
            border-radius:8px;
            background:#fff;
            box-shadow:0 4px 12px rgba(0,0,0,.05);
            display:flex;
            flex-direction:column;
            max-height:none;
            height:auto;
            overflow:visible;
        }

        .piiPanelHeader{
            background:var(--col-header);
            border-bottom:1px solid var(--grid);
            border-top-left-radius:8px;
            border-top-right-radius:8px;
            font-weight:700;
            font-size:16px;
            text-align:center;
            padding:10px 8px;
            line-height:1.4;
        }

        #piiListScroll{
            flex:1 1 auto;
            padding:8px;
            font-size:16px;
            line-height:1.4;
            background:#fff;
            overflow:visible;
        }

        .piiRow{
            border-bottom:1px dashed var(--grid);
            padding:8px 6px;
            display:flex;
            flex-direction:row;
            align-items:stretch;
            gap:6px;
        }
        .piiRow:last-child{ border-bottom:none; }

        .pii-bullet{
            flex:0 0 auto;
            font-size:20px;
            font-weight:600;
            min-width:20px;
            text-align:center;
            line-height:1.4;
        }

        .pii-textwrap{
            flex:1 1 auto;
            width:100%;
        }

        .pii-textwrap textarea{
            width:100%;
            min-height:0px;
            border:none;
            background:transparent;
            resize:none;          /* мӮ¬мҡ©мһҗк°Җ л“ңлһҳк·ёлЎң нҒ¬кё° ліҖкІҪ лӘ»н•Ё */
            font-size:16px;
            line-height:1.35;
            padding:4px;
            height:auto;          /* кі м •/мөңмҶҢ лҶ’мқҙ м ңкұ° */
            white-space:pre-wrap; /* мӨ„л°”кҝҲ ліҙмЎҙ */
            /* н…ҚмҠӨнҠёк°Җ лҠҳл©ҙ мҠӨнҒ¬лЎӨ лҢҖмӢ  лҶ’мқҙ нҷ•мһҘ */
            overflow:hidden;
        }
        .pii-textwrap textarea:focus{
            outline:1px solid #60a5fa;
        }

        /* modelBox м•„лһҳ */
        #modelBox{
            width:100%;
            height:180px;
            margin-top:10px;
            font-size:16px;
            line-height:1.4;
            font-family:ui-monospace,Consolas,monospace;
            border:1px solid var(--border);
            border-radius:6px;
            padding:8px;
        }

        /* мәЎміҗ лӘЁл“ңмқј л•Ң м ңмҷён•  мҡ”мҶҢ мҲЁкё°кё° */
        .capture-mode #paletteCol,
        .capture-mode #modelBox{
            display: none !important;
        }
        /* н•ң мӨ„ мң м§Җ + мҪҳн…җмё  м „мІҙ нҸӯмңјлЎң нҷ•мһҘ */
        .capture-mode .frame {
            width: max-content !important;
        }
        .capture-mode .bluebar {
            position: static !important;
        }
        /* мәЎміҗ мӢңм—җлҸ„ мўҢ/мӨ‘м•ҷ/мҡ°(PII) н•ң мӨ„ мң м§ҖлҘј к°•м ң */
        .capture-mode .main-row {
            display: flex !important;
            flex-wrap: nowrap !important;     /* мӨ„л°”кҝҲ кёҲм§Җ */
            align-items: flex-start !important;
            width: max-content !important;     /* мҪҳн…җмё  л„Ҳл№„л§ҢнҒј нҷ•мһҘ(л·°нҸ¬нҠёліҙлӢӨ л„“м–ҙлҸ„ OK) */
        }
        /* мӨ‘м•ҷ н‘ң+лӢӨмқҙм–ҙк·ёлһЁ лһҳнҚјлҠ” мң лҸҷ нҸӯ(мҪҳн…җмё л§ҢнҒј) */
        .capture-mode #tableWrapOuter {
            flex: 0 0 auto !important;        /* мӨ„л°”кҝҲ л°©м§Җ + лӮҙмҡ©л§ҢнҒј м°Ём§Җ */
            width: max-content !important;
        }
        /* мҡ°мёЎ PII нҢЁл„җлҸ„ н•ң мӨ„м—җ кі м • */
        .capture-mode #piiPanel {
            position: static !important;       /* sticky/fixed мҳҒн–Ҙ м ңкұ°, лЈЁнҠё м•Ҳм—җ нҸ¬н•Ё */
            flex: 0 0 auto !important;         /* мӨ„л°”кҝҲ л°©м§Җ */
        }
    </style>
</head>
<body>
<div class="page">
    <div class="toolbar">
        <button id="fetchBtn">нқҗлҰ„н‘ңм—җм„ң л¶Ҳлҹ¬мҳӨкё°</button>
        <button id="saveBtn">м ҖмһҘ</button>
        <button id="loadBtn">л¶Ҳлҹ¬мҳӨкё°</button>

        <button id="clearDiagramBtn" title="нқҗлҰ„лҸ„лҘј лӘЁл‘җ л№„мӣҒлӢҲлӢӨ">нқҗлҰ„лҸ„ л№„мҡ°кё°</button>

        <button id="clearPIIBtn">мІҳлҰ¬ к°ңмқём •ліҙ л№„мҡ°кё°</button>
        <button id="addRowBtn">мІҳлҰ¬ к°ңмқём •ліҙ н–ү м¶”к°Җ</button>
        <button id="delRowBtn">мІҳлҰ¬ к°ңмқём •ліҙ н–ү мӮӯм ң(л§Ҳм§Җл§ү)</button>

        <button id="linkStyleToggleBtn" title="мӢӨм„ /м җм„  м „нҷҳ">л§ҒнҒ¬ мҠӨнғҖмқј: мӢӨм„ </button>
        <button id="linkColorToggleBtn" title="кІҖм •/л№Ёк°• м „нҷҳ">л§ҒнҒ¬ мғүмғҒ: кІҖм •</button>

        <button id="editModeToggleBtn">
            <span class="icon" aria-hidden="true">рҹ–ұпёҸ</span>
            <span class="label">нқҗлҰ„лҸ„ нҺём§‘ лӘЁл“ң</span>
        </button>
    </div>

    <div class="frame">
        <div class="bluebar" id="flowTitleBar">м—…л¬ҙлӘ… : </div>

        <div class="main-row">
            <!-- нҢ”л ҲнҠё м—ҙ -->
            <div id="paletteCol">
                <div id="palette"></div>
            </div>

            <!-- к°ҖмҡҙлҚ° н‘ң + лӢӨмқҙм–ҙк·ёлһЁ -->
            <div id="tableWrapOuter">
                <div class="tableHeader">
                    <div>мғқлӘ…мЈјкё°</div>
                    <div>мҲҳм§‘</div>
                    <div>ліҙмң </div>
                    <div>мқҙмҡ©</div>
                    <div>м ңкіө</div>
                    <div>нҢҢкё°</div>
                </div>

                <div id="gridWrap">
                    <div id="tableGrid">
                        <!-- Row 1: мІҳлҰ¬нқҗлҰ„ -->
                        <div class="cell rowlabel" data-rowtype="flow">мІҳлҰ¬нқҗлҰ„</div>
                        <div class="cell flowcell" data-col="collect"><textarea></textarea></div>
                        <div class="cell flowcell" data-col="retain"><textarea></textarea></div>
                        <div class="cell flowcell" data-col="use"><textarea></textarea></div>
                        <div class="cell flowcell" data-col="provide"><textarea></textarea></div>
                        <div class="cell flowcell" data-col="discard"><textarea></textarea></div>

                        <!-- Row 2: лӢЁкі„ м„ӨлӘ… -->
                        <div class="cell rowlabel" data-rowtype="desc">м„ӨлӘ…</div>
                        <div class="cell desc-row autosize-target" data-phase="collect"><textarea class="desc-collect"></textarea></div>
                        <div class="cell desc-row autosize-target" data-phase="retain"><textarea class="desc-retain"></textarea></div>
                        <div class="cell desc-row autosize-target" data-phase="use"><textarea class="desc-use"></textarea></div>
                        <div class="cell desc-row autosize-target" data-phase="provide"><textarea class="desc-provide"></textarea></div>
                        <div class="cell desc-row autosize-target" data-phase="discard"><textarea class="desc-discard"></textarea></div>
                    </div>

                    <!-- лӢӨмқҙм–ҙк·ёлһЁмқҖ н‘ң мң„м—җ кІ№м№ңлӢӨ -->
                    <div id="diagramOverlay"></div>
                </div>
            </div>

            <!-- мҳӨлҘёмӘҪ мІҳлҰ¬ к°ңмқём •ліҙ нҢЁл„җ -->
            <div id="piiPanel">
                <div class="piiPanelHeader">мІҳлҰ¬ к°ңмқём •ліҙ</div>
                <div id="piiListScroll">
                    <!-- лҸҷм Ғ н–ү -->
                </div>
            </div>
        </div> <!-- /main-row -->
    </div> <!-- /frame -->

    <textarea id="modelBox" placeholder="м ҖмһҘмқ„ лҲ„лҘҙл©ҙ нҳ„мһ¬ нқҗлҰ„лҸ„к°Җ JSON нҳ•нғңлЎң м ҖмһҘлҗ©лӢҲлӢӨ."></textarea>
</div>

<script>
    /* ====== GoJS лқјмқҙм„ мҠӨ ====== */
    (() => {
        const key = new URLSearchParams(location.search).get("gojs_key");
        if (key) go.Diagram.licenseKey = key;
    })();

    /* ========= л Ҳмқҙм•„мӣғ/мўҢн‘ң кі„мӮ° ========= */
    function getMetrics() {
        const rootStyles = getComputedStyle(document.documentElement);
        const leftW = parseFloat(rootStyles.getPropertyValue('--left-w'));
        const colW  = parseFloat(rootStyles.getPropertyValue('--col-w'));

        // gridWrap кё°мӨҖмңјлЎң кі„мӮ°
        const gridWrap = document.getElementById('gridWrap');
        const gridRect = gridWrap.getBoundingClientRect();

        // overlayлҠ” "мҲҳм§‘~нҢҢкё°" 5м—ҙ мң„м—җл§Ң мҳ¬л Өм•ј н•ҳлҜҖлЎң
        // overlayмқҳ leftлҠ” leftW л§ҢнҒј мҡ°мёЎмңјлЎң л°Җл Өм•ј н•Ё
        const offsetLeft = leftW;
        const overlayW   = colW * 5;
        const overlayH   = gridRect.height;

        return {
            offsetLeft,
            offsetTop: 0,
            width:overlayW,
            height:overlayH,
            leftW, colW
        };
    }

    function resizeOverlay(){
        const m = getMetrics();
        const overlay = document.getElementById('diagramOverlay');
        overlay.style.left   = m.offsetLeft + 'px';
        overlay.style.top    = m.offsetTop  + 'px';
        overlay.style.width  = m.width + 'px';
        overlay.style.height = m.height + 'px';
        autosizeAllTextareas();
    }

    /* desc textarea мһҗлҸҷ лҶ’мқҙ */
    function autosizeAllTextareas(){
        document.querySelectorAll('.cell textarea').forEach(ta=>{
            ta.style.overflow = 'hidden';
            ta.style.minHeight = '0px';
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';

            const cell = ta.closest('.cell');
            if (cell){
                const min = Math.max(ta.scrollHeight, 32);  // мөңмҶҢ лҶ’мқҙ ліҙмһҘ
                cell.style.minHeight = min + 'px';
                cell.style.height = 'auto';
            }
        });
    }

    /* мһ…л Ҙ мӢң мҰүмӢң л°ҳмҳҒ */
    function wireAutosizeAll(){
        document.querySelectorAll('.cell textarea').forEach(ta=>{
            if (ta._wired) return;
            ta._wired = true;
            ta.addEventListener('input', autosizeAllTextareas);
        });
    }

    // --- URL нҢҢлқјлҜён„° нҢҢмӢұ: task_idx, company_id ---
    const url = new URL(window.location.href);
    const taskId = url.searchParams.get("task_id");
    const companyId = url.searchParams.get("company_id");
    if (!companyId) alert("company_idк°Җ н•„мҡ”н•©лӢҲлӢӨ");
    if (!taskId)    alert("task_idк°Җ н•„мҡ”н•©лӢҲлӢӨ");
    console.log("Loaded company_id =", companyId, "task_id =", taskId);

    /* ========= нҸ¬нҠё/л§ҒнҒ¬ мң нӢё ========= */
    const $ = go.GraphObject.make;

    const sideSpotMap = {
        L: go.Spot.LeftSide,
        R: go.Spot.RightSide,
        T: go.Spot.TopSide,
        B: go.Spot.BottomSide
    };
    function sideOf(pid){ return (pid && pid[0]) || 'T'; }

    const baseNode = { locationSpot: go.Spot.TopLeft };

    function makeSideSlabPort(side) {
        const sideSpotMap = { L: go.Spot.LeftSide, R: go.Spot.RightSide, T: go.Spot.TopSide, B: go.Spot.BottomSide };
        const isH = side === "T" || side === "B";
        return $(go.Shape, "Rectangle", {
            name: side + "_SLAB",
            fill: "transparent",       // нҲ¬лӘ… (кІ°кі„ X)
            stroke: null,
            stretch: isH ? go.Stretch.Horizontal : go.Stretch.Vertical,  // л©ҙ м „мІҙ нҷңм„ұнҷ” (л¶„мӮ° к°ҖлҠҘ)
            geometryStretch: go.GeometryStretch.None,                    // л…ёл“ң нҒ¬кё° мҳҒн–Ҙ м°ЁлӢЁ
            alignment: ({T:go.Spot.Top,B:go.Spot.Bottom,L:go.Spot.Left,R:go.Spot.Right})[side],
            alignmentFocus: ({T:go.Spot.Top,B:go.Spot.Bottom,L:go.Spot.Left,R:go.Spot.Right})[side],
            portId: side,
            fromLinkable: true, toLinkable: true,
            fromLinkableDuplicates: true, toLinkableDuplicates: true,
            fromSpot: sideSpotMap[side], toSpot: sideSpotMap[side],
            cursor: null,              // мӢӯмһҗм»Өм„ң м ңкұ°

    go.Shape.defineFigureGenerator("Star5", function(shape, w, h) {

    const points = [
        0.5, 0,
        0.618, 0.382,
        1, 0.382,
        0.691, 0.618,
        0.809, 1,
        0.5, 0.76,
        0.191, 1,
        0.309, 0.618,
        0, 0.382,
        0.382, 0.382
    ];
    // PathFigureм—җ м җ м¶”к°Җ
    for (let i = 0; i < points.length; i += 2) {
        fig.add(new go.PathSegment(go.PathSegment.Line,
        points[i] * w,
        points[i + 1] * h
        ));
    }
    geo.add(fig);
    geo.normalize();
    return geo;

        function siblingsCurvinessBinding(){
            return new go.Binding("curviness", "", (_, obj) => {
                const link = obj.part; if (!link) return 0;
                const siblings = link.fromNode && link.toNode

                let i = 0, n = 0;
                if (siblings) { siblings.each(l => { if (l === link) i = n; n++; }); }
                if (n <= 1) return 0;
                const step = 22, mid = (n - 1) / 2;
                return (i - mid) * step;
            });
        }

    function adjustFlowRowHeight() {
        if (!myDiagram) return;

        // лӢӨмқҙм–ҙк·ёлһЁмқҳ л…ёл“ң мӨ‘ к°ҖмһҘ м•„лһҳмӘҪ(y+height) мң„м№ҳ кі„мӮ°
        let maxY = 0;
        myDiagram.nodes.each(node => {
            const b = node.actualBounds;
            const bottom = b.y + b.height;
            if (bottom > maxY) maxY = bottom;
        });

        // м•Ҫк°„мқҳ м—¬л°ұ м¶”к°Җ
        const targetH = Math.ceil(maxY + 80);  // 80px м—¬л°ұ

        // CSS ліҖмҲҳ м—…лҚ°мқҙнҠё
        document.documentElement.style.setProperty('--cell-min-h', `${targetH}px`);

        // мӢӨм ң м…Җ мҠӨнғҖмқјлҸ„ к°•м ңлЎң к°ұмӢ 
        document.querySelectorAll('.flowcell, .cell.rowlabel[data-rowtype="flow"]').forEach(el => {
            el.style.minHeight = `${targetH}px`;
            el.style.height = `${targetH}px`;
        });

        // overlay мҳҒм—ӯ лӢӨмӢң кі„мӮ°
        resizeOverlay();
    }

    /* ========= мӣҗнҳ•мҲ«мһҗ л§Ңл“Өкё° (PIIмҷҖ нқҗлҰ„лҸ„м—җм„ң мӮ¬мҡ©) ========= */
    function numToCircle(n){
        if (n >= 1 && n <= 20) {
            return String.fromCharCode(0x2460 + (n - 1));
        }
        // гү‘(21)~гҠҝ(50)
        if (n >= 21 && n <= 35) {
            return String.fromCharCode(0x3250 + (n - 20)); // гү‘мқҖ U+3251 (0x3250 + 1)
        }
        if (n >= 36 && n <= 50) {
            return String.fromCharCode(0x32B1 + (n - 35));
        }
    }

    /* ========= PII нҢЁл„җ ========= */
    function buildPIIRowDom(idx, initialVal){
        const row = document.createElement('div');
        row.className = 'piiRow';
        row.setAttribute('data-type','pii');

        const bullet = document.createElement('div');
        bullet.className = 'pii-bullet';
        bullet.textContent = numToCircle(idx);

        const wrap = document.createElement('div');
        wrap.className = 'pii-textwrap';

        const ta = document.createElement('textarea');
        ta.value = initialVal || "";

        wrap.appendChild(ta);
        row.appendChild(bullet);
        row.appendChild(wrap);
        return row;
    }
    function renumberPIIRows(){
        const list = document.getElementById('piiListScroll');
        const rows = Array.from(list.querySelectorAll('.piiRow'));
        rows.forEach((r,i)=>{
            const b = r.querySelector('.pii-bullet');
            if (b) b.textContent = numToCircle(i+1);
        });
    }
    function addPIIRow(val=""){
        const list = document.getElementById('piiListScroll');
        const idx = list.querySelectorAll('.piiRow').length + 1;
        list.appendChild(buildPIIRowDom(idx, val));
        renumberPIIRows();
    }
    function delLastPIIRow(){
        const list = document.getElementById('piiListScroll');
        const rows = list.querySelectorAll('.piiRow');
        if (!rows.length) return;
        list.removeChild(rows[rows.length-1]);
        renumberPIIRows();
    }
    function clearAllPIIRows(){
        const list = document.getElementById('piiListScroll');
        list.innerHTML = "";
        addPIIRow("");
    }
    function getPIIArrayFromPanel(){
        const list = document.getElementById('piiListScroll');
        const rows = Array.from(list.querySelectorAll('.piiRow'));
        return rows.map(r=>{
            const ta  = r.querySelector('textarea');
            const div = r.querySelector('.pii-text');
            return ta ? ta.value : (div ? div.innerText : "");
        });
    }
    function formatPIIItem(item){
        if (!item) return "";
        if (typeof item === "string") return item;
        if (item.id || item.fields){
            const head = item.id ? `<b>${item.id}</b>` : "";
            const body = Array.isArray(item.fields) ? item.fields.join(", ") : "";
            return head + (body ? " : " + body : "");
        }
        return JSON.stringify(item);
    }

    function renderPIIFromJSON(arrInput){
        const arr = Array.isArray(arrInput) ? arrInput : (window.piiArr || []);  // вҳ… м¶”к°Җ
        const list = document.getElementById('piiListScroll');
        list.innerHTML = "";

        if (!Array.isArray(arr) || arr.length === 0){
            renumberPIIRows();

    // ===== PII textarea мһҗлҸҷ лҶ’мқҙ(лҸҷм Ғ м¶”к°Җк№Ңм§Җ лҢҖмқ‘) =====
    (function () {
        const ROOT_ID = 'piiListScroll';
        const SEL = `#${ROOT_ID} textarea`;

        function autoResize(ta) {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
        }
        function wire(ta) {
            if (!ta || ta._wired) return;
            ta._wired = true;
            ta.style.overflow = 'hidden';   // лӮҙл¶Җ мҠӨнҒ¬лЎӨ мҲЁк№Җ
            ta.style.height = 'auto';
            ta.addEventListener('input', () => autoResize(ta));
            // нҸ°нҠё/л Ҳмқҙм•„мӣғ м Ғмҡ© м§Ғнӣ„ н•ңлІҲ лҚ”
            requestAnimationFrame(() => autoResize(ta));
        }
        function scanAll() {
            document.querySelectorAll(SEL).forEach(wire);
        }

        // мҙҲкё° DOM мҷ„м„ұ/лҰ¬мҶҢмҠӨ лЎңл“ң нӣ„ 1нҡҢ
        document.addEventListener('DOMContentLoaded', scanAll);
        window.addEventListener('load', scanAll);

        // лҸҷм Ғ м¶”к°Җ(л ҢлҚ”/append) к°җмӢң
        function observe() {
            const root = document.getElementById(ROOT_ID);
            if (!root) return;
            new MutationObserver(muts => {
                for (const m of muts) {
                    for (const n of m.addedNodes) {
                        if (n.nodeType !== 1) continue;
                        if (n.matches?.('textarea')) wire(n);
                        n.querySelectorAll?.('textarea').forEach(wire);
                    }
                }
            }).observe(root, { childList: true, subtree: true });
        }
        observe();
    })();

    /* ========= лӢЁкі„ м„ӨлӘ… мұ„мҡ°кё° (л¬ёмһҗм—ҙ/л°°м—ҙ лӘЁл‘җ м§Җмӣҗ) ========= */
    function fillDescriptions(descJson){
        const mapping = [
            ["мҲҳм§‘",".desc-collect"],
            ["ліҙмң ",".desc-retain"],
            ["мқҙмҡ©",".desc-use"],
            ["м ңкіө",".desc-provide"],
            ["нҢҢкё°",".desc-discard"]
        ];

        mapping.forEach(([phase, sel])=>{
            const ta = document.querySelector(sel);
            if (!ta) return;
            const v = descJson ? descJson[phase] : null;
            ta.value = (typeof v === "string" ? v : Array.isArray(v) ? v.join("\n") : "");
            ta.style.height = "auto"; // мһҗлҸҷ лҶ’мқҙ мІҳлҰ¬(мҠӨнҒ¬лЎӨ л°©м§Җ)
            ta.style.height = (ta.scrollHeight) + "px";
        });

        if (typeof autosizeAllTextareas === "function") autosizeAllTextareas();
        if (typeof resizeOverlay === "function") resizeOverlay();
    }

    function getAPIBase() {
        // 1) л¶ҖлӘЁ(React) windowм—җ м„Өм •лҗң к°’ мҡ°м„  мӮ¬мҡ©
        try {
            if (window.parent && window.parent !== window) {
                const v = window.parent.__API_BASE__;
                if (typeof v === 'string' && v.length > 0) {
                    return v;         // мҳҲ: "/flow"
                }
            }
        } catch (e) {
            // cross-originмқҙл©ҙ м—¬кё°м„ң м—җлҹ¬
        }

        // 2) нҳ№мӢңлқјлҸ„ iframe мһҗкё° windowм—җ к°’мқҙ мһҲмңјл©ҙ мӮ¬мҡ©
        if (typeof window.__API_BASE__ === 'string' && window.__API_BASE__.length > 0) {
            return window.__API_BASE__;
        }

        // 3) к·ёлһҳлҸ„ м—Ҷмңјл©ҙ лЎңм»¬ к°ңл°ңмҡ© кё°ліёк°’
        return 'http://localhost:8000';
    }

    /* online м—¬л¶ҖлЎң category м •к·ңнҷ” & link мҠӨнғҖмқј м •к·ңнҷ” */
    function normalizeDiagram(diagram){
        const patched = JSON.parse(JSON.stringify(diagram||{}));
        if (!patched.nodeDataArray) patched.nodeDataArray = [];
        if (!patched.linkDataArray) patched.linkDataArray = [];

        patched.nodeDataArray = patched.nodeDataArray.map(nd => {
            if (nd.category === "system"){
                if (nd.online === false){ nd.category = "system_offline"; }
            } else if (nd.category === "database"){
                if (nd.online === false){ nd.category = "database_offline"; }
            } else if (nd.category === "discard"){
                if (nd.online === false){ nd.category = "discard_offline"; }
            }
            return nd;
        });

        patched.linkDataArray = patched.linkDataArray.map(ld => {
            // мөңмҙҲ лЎңл“ң мӢң л…ёл“ң кҙҖнҶө л°©м§Җ: м ҖмһҘлҸј мҳЁ мўҢн‘ңлҠ” лІ„л Ө мһ¬кі„мӮ° мң лҸ„
            delete ld.points;

            if (typeof ld.online === "boolean"){
                ld.category = ld.online ? "solid" : "dashed";
            }
            return ld;
        });
        return patched;
    }

    /* к°ҷмқҖ л…ёл“ңмҢҚ(from,to)м—җм„ң мғү(кІҖм •/л№Ёк°•)лі„лЎң л§ҒнҒ¬ н•©м№ҳкё°
       - JSONмқҳ textлҘј к·ёлҢҖлЎң мӮ¬мҡ©
       - к°ҷмқҖ мғүмғҒ к·ёлЈ№м—җм„ң textлҘј лӘЁм•„ мӨ‘ліө м ңкұ° нӣ„ "A, B, C"лЎң кІ°н•©
       - кІ°кіј: к·ёлЈ№лі„ мөңлҢҖ 1к°ң(кІҖм • 1к°ң, л№Ёк°• 1к°ң) вҶ’ м „мІҙ мөңлҢҖ 2к°ң */
    function mergeLinksByColor(diagram){
        if (!diagram) return;
        const model = diagram.model;
        const groups = new Map(); // key = `${from}|${to}|${stroke}`

        diagram.links.each(l => {
            const d = l.data || {};
            const from = d.from, to = d.to;
            if (from == null || to == null) return;
            const color = (d.stroke && String(d.stroke)) || "black"; // мҳЁлқјмқём—¬л¶Җ=мғү
            const key = `${from}|${to}|${color}`;
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(l);
        });

        model.commit(m => {
            groups.forEach(list => {
                if (list.length <= 1) return;

                // 1) лқјлІЁ мҲҳм§‘(мһҲлҠ” к·ёлҢҖлЎң), мӨ‘ліө м ңкұ°(мҲңм„ң ліҙмЎҙ)
                const labels = [];
                list.forEach(l => {
                    const t = (l.data && l.data.text != null) ? String(l.data.text).trim() : "";
                    if (t) labels.push(t);
                });
                const uniq = Array.from(new Set(labels));      // ["5","6","7"] лҳҗлҠ” ["PII-5","PII-7"]

                // 2) мІ« л§ҒнҒ¬л§Ң лӮЁкё°кі  лӮҳлЁём§ҖлҠ” м ңкұ°
                const base = list[0];
                for (let i=1; i<list.length; i++) {
                    m.removeLinkData(list[i].data);
                }

                // 3) кІ°н•© лқјлІЁ м Ғмҡ© ("5, 6, 7" лҳҗлҠ” "abc, def")
                const label = uniq.join(", ");
                m.setDataProperty(base.data, "text", label);

                // 4) нҸ¬мқёнҠё мҙҲкё°нҷ”н•ҙ мһ¬лқјмҡ°нҢ… мң лҸ„
                m.setDataProperty(base.data, "points", undefined);
            });
        }, "merge-links-by-color");

        // кІ№м№Ё мҷ„нҷ”: нҸ¬нҠё мһ¬л°°м№ҳ + мһ¬лқјмҡ°нҢ…
        rerouteAllLinks(myDiagram);
        diagram.links.each(l => l.invalidateRoute());
    }

    function rerouteAllLinks(diagram){
        diagram.model.commit(m => {
            diagram.links.each(l => {
                m.setDataProperty(l.data, "points", undefined);  // лӢӨмқҢ нӢұм—җ кІҪлЎң мһ¬кі„мӮ°
                l.invalidateRoute();
            });
        }, "reroute-all");
    }

    // combined к°қмІҙлҘј нҷ”л©ҙм—җ л°ҳмҳҒ(м ңлӘ©/лӢӨмқҙм–ҙк·ёлһЁ/PII/м„ӨлӘ…)н•ҳлҠ” кіөнҶө н•ЁмҲҳ
    async function applyCombinedToScreen(combined){
        const diagram  = combined?.diagram;
        const pii      = combined?.pii;
        const desc     = combined?.description;

        // нҢҢлһҖ нғҖмқҙнӢҖл°”: лӘЁлҚём—җ м—Ҷмңјл©ҙ DBм—җм„ң taskName мЎ°нҡҢ
        let flowTitle = (diagram && diagram.modelData && diagram.modelData.flowTitle) || "";
        if (!flowTitle) {
            try { flowTitle = await fetchTaskNameFromDB(); } catch {}
        }
        const bar = document.getElementById('flowTitleBar');
        if (bar) bar.textContent = `м—…л¬ҙлӘ… : ${flowTitle || "лҜём •"}`;

        // лӢӨмқҙм–ҙк·ёлһЁ
        if (diagram){
            const normalized = normalizeDiagram(diagram);
            myDiagram.model = go.Model.fromJson(normalized);

            // лЎңл“ң м§Ғнӣ„ 1нҡҢ: мһ¬лқјмҡ°нҢ… + л§ҒнҒ¬лі‘н•©
            (function kickRerouteAndMergeOnce(diagram){
                diagram.links.each(l => l.invalidateRoute());
                const once = () => {
                    diagram.removeDiagramListener("ViewportBoundsChanged", once);
                    diagram.links.each(l => l.invalidateRoute());
                    diagram.layoutDiagram(true);
                    rerouteAllLinks(diagram);
                    mergeLinksByColor(diagram);
                    diagram.updateAllTargetBindings();
                };
                diagram.addDiagramListener("ViewportBoundsChanged", once);
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        diagram.links.each(l => l.invalidateRoute());
                        diagram.layoutDiagram(true);
                        rerouteAllLinks(diagram);
                        mergeLinksByColor(diagram);
                        diagram.updateAllTargetBindings();
                    });
                });
            })(myDiagram);
        }

        // PII
        if (Array.isArray(pii)) {
            renderPIIFromJSON(pii);
        }

        // м„ӨлӘ…
        fillDescriptions(desc || {});
    }

    /* ========= лІ„нҠј/IO ========= */
    function hookIO(){

        function kickRerouteAndMergeOnce(diagram){
            // 1) мҰүмӢң н•ң лІҲ к°ҖліҚкІҢ к№Ёмҡ°кё°
            diagram.links.each(l => l.invalidateRoute());

            // 2) мӢӨм ң л·°нҸ¬нҠё л°°м№ҳк°Җ лҒқлӮң мӢңм җм—җ 1нҡҢ мӢӨн–ү

                diagram.removeDiagramListener("ViewportBoundsChanged", once);
                diagram.links.each(l => l.invalidateRoute());
                diagram.layoutDiagram(true);                  // вҳ… bounds ліҙмһҘ
                rerouteAllLinks(diagram);
                mergeLinksByColor(diagram);
                diagram.updateAllTargetBindings();
            };
            diagram.addDiagramListener("ViewportBoundsChanged", once);

            // 3) нҳ№мӢң мқҙлІӨнҠёк°Җ нҷҳкІҪ л”°лқј м•Ҳ лңЁлҠ” кІҪмҡ° л°ұм—…: rAF Г— 2
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    diagram.links.each(l => l.invalidateRoute());

                    rerouteAllLinks(diagram);
                    mergeLinksByColor(diagram);
                    diagram.updateAllTargetBindings();

    /* ========= кё°нғҖ мң нӢё ========= */
    function clearDiagram(){
        const empty = new go.GraphLinksModel();
        myDiagram.model = empty;
        myDiagram.clearSelection();
        myDiagram.isModified = true;
    }

    // лӮҳмӨ‘м—җ н•„мҡ”н•ҳл©ҙ top-left м •л ¬ лЎңм§Ғ л„Јмқ„ мһҗлҰ¬
    function alignTopLeftAfterLoad(){}

    // л¶ҖлӘЁ(React) вҶ’ мһҗмӢқ(iframe:flow1.html) л©”мӢңм§Җ мІҳлҰ¬
    window.addEventListener("message", async (ev) => {
        const data = ev.data || {};
        if (!data || typeof data !== "object") return;

        // лӢӨмқҙм–ҙк·ёлһЁ лЁјм Җ мҙҲкё°нҷ”лҗҳм—ҲлҠ”м§Җ к°Җл“ң
        if (!window.myDiagram) {
            // мҙҲкё°нҷ”к°Җ м•„м§Ғмқҙл©ҙ м•Ҫк°„л§Ң лҠҰм¶°м„ң мһ¬мӢңлҸ„
            setTimeout(() => window.dispatchEvent(new MessageEvent("message", { data })), 60);
            return;
        }

        if (data.type === "trigger-build-and-load") {
            try {
                await fetch(`${getAPIBase()}/api/build?company_id=${encodeURIComponent(companyId)}&task_id=${encodeURIComponent(taskId)}`, { method: "POST" });
                const combined = await fetchCombinedFromDB();
                await applyCombinedToScreen(combined);
            } catch (e) {
                console.error(e);
                alert("л°ұм—”л“ң л№Ңл“ң/лЎңл“ң мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.");
            }
        }
        else if (data.type === "request-combined-json") {
            // нҳ„мһ¬ нҷ”л©ҙ мғҒнғңлҘј л¶ҖлӘЁлЎң м „лӢ¬
            const diagramJSON = JSON.parse(myDiagram.model.toJson());
            const piiArray    = getPIIArrayFromPanel();
            const descOut = {
                "мҲҳм§‘": document.querySelector(".desc-collect")?.value || "",
                "ліҙмң ": document.querySelector(".desc-retain")?.value || "",
                "мқҙмҡ©": document.querySelector(".desc-use")?.value || "",
                "м ңкіө": document.querySelector(".desc-provide")?.value || "",
                "нҢҢкё°": document.querySelector(".desc-discard")?.value || ""
            };
            const combined = { diagram: diagramJSON, pii: piiArray, description: descOut };
            window.parent?.postMessage({ type: "combined-json", payload: combined }, "*");
        }
    });

    // нқҗлҰ„лҸ„л§Ң мқҙлҜём§ҖлЎң м ҖмһҘн•ҳлҠ” кІҪлЎң мғқм„ұ
    window.getFlowPngDataUrl = () => myDiagram.makeImageData({ background: "white", scale: 2 });

    // н‘ң+лӢӨмқҙм–ҙк·ёлһЁ+PII м „мІҙлҘј PNGлЎң мәЎмІҳ
    window.captureWholePanelPng = async function (zoom = 1.0) {
        const root = document.querySelector(".frame");
        if (!root) throw new Error("мәЎміҗ лЈЁнҠё(.frame)лҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.");

        // н•ҙмғҒлҸ„(м„ лӘ…лҸ„) м„Өм •
        const dpr = window.devicePixelRatio || 1;
        const TARGET_EXPORT_SCALE = 1;                 // 1.5~2 к¶ҢмһҘ
        const canvasScale = TARGET_EXPORT_SCALE / dpr; // лёҢлқјмҡ°м Җ мӨҢкіј л¬ҙкҙҖн•ҳкІҢ м„ лӘ…лҸ„ кі м •

        // мӣҗліөмҡ© мғҒнғң м ҖмһҘ
        const html = document.documentElement;
        const body = document.body;
        const prevHtmlOverflow = html.style.overflow;
        const prevBodyOverflow = body.style.overflow;
        const prevScrollX = window.scrollX;
        const prevScrollY = window.scrollY;

        // мәЎмІҳ м „м—җ textarea мһҗлҸҷ лҶ’мқҙ ліҙм •
        if (typeof autosizeAllTextareas === "function") autosizeAllTextareas();
        // л Ҳмқҙм•„мӣғ л°ҳмҳҒ лҢҖкё°(rAF 2нҡҢк°Җ м•Ҳм •м Ғ)
        await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));

        // мәЎмІҳ лӘЁл“ң м§„мһ…(нҢ”л ҲнҠё/лӘЁлҚёл°•мҠӨ мҲЁк№Җ, н•ң мӨ„ кі м • л“ұ)
        html.classList.add("capture-mode");

        // мҠӨмјҖмқј м Ғмҡ© м „мқҳ 'мһҗм—° нҒ¬кё°'
        const naturalWidth  = root.scrollWidth;
        const naturalHeight = root.scrollHeight;

        // лёҢлқјмҡ°м Җ л ҢлҚ” мҠӨмјҖмқј(мӨҢ нҡЁкіј) м Ғмҡ©
        const prevTransform = root.style.transform;
        const prevTransformOrigin = root.style.transformOrigin;
        root.style.transformOrigin = "top left";
        root.style.transform = `scale(${zoom})`;

        // мҠӨнҒ¬лЎӨ/мҳӨлІ„н”ҢлЎңмҡ° кі м •
        html.style.overflow = "hidden";
        body.style.overflow = "hidden";
        window.scrollTo(0, 0);

        try {
            const width  = Math.ceil(naturalWidth  * zoom);
            const height = Math.ceil(naturalHeight * zoom);

            const canvas = await html2canvas(root, {
                backgroundColor: "#ffffff",
                scale: canvasScale,     // н•ҙмғҒлҸ„(м„ лӘ…лҸ„)
                width,
                height,
                windowWidth:  width,    // л·°нҸ¬нҠёлҘј м»Ён…җмё  нҒ¬кё°м—җ л§һм¶Ө
                windowHeight: height,
                scrollX: 0,
                scrollY: 0,
                useCORS: true,
                removeContainer: true,

                // вң… ліөм ң DOMм—җм„ң textarea вҶ’ divлЎң көҗмІҙ(мһҳлҰј л°©м§Җ)
                onclone: (doc) => {
                    const frameClone = doc.querySelector(".frame");
                    if (!frameClone) return;

                    frameClone.querySelectorAll("textarea").forEach((ta) => {
                        const cs = doc.defaultView.getComputedStyle(ta);
                        const div = doc.createElement("div");

                        // лӮҙмҡ©
                        div.textContent = ta.value;

                        // нҒ¬кё°/л Ҳмқҙм•„мӣғ: textareaк°Җ ліҙмқҙлҚҳ к·ёлҢҖлЎң
                        const w = ta.clientWidth || parseFloat(cs.width) || 0;
                        const h = ta.scrollHeight || ta.clientHeight || 0;
                        div.style.width = w + "px";
                        div.style.minHeight = h + "px";
                        div.style.height = h + "px";

                        // н…ҚмҠӨнҠё л ҢлҚ”л§Ғ мң мӮ¬нҷ”
                        div.style.whiteSpace = "pre-wrap";
                        div.style.wordBreak = "break-word";
                        div.style.overflow = "visible";

                        // мЈјмҡ” мҠӨнғҖмқј ліөм ң
                        div.style.font = cs.font || "";
                        div.style.lineHeight = cs.lineHeight || "";
                        div.style.padding = cs.padding || "";
                        div.style.border = cs.border || "none";
                        div.style.borderRadius = cs.borderRadius || "";
                        div.style.background = cs.backgroundColor || "transparent";
                        div.style.color = cs.color || "";

                        ta.parentNode.replaceChild(div, ta);
                    });
                },

                // (мғҒнҷ©м—җ л”°лқј лҸ„мӣҖмқҙ лҗ  мҲҳ мһҲмқҢ)
                // foreignObjectRendering: true,
            });

            return canvas.toDataURL("image/png");
        } finally {
            // мӣҗліө
            root.style.transform = prevTransform;
            root.style.transformOrigin = prevTransformOrigin;
            html.classList.remove("capture-mode");
            html.style.overflow = prevHtmlOverflow;
            body.style.overflow = prevBodyOverflow;
            window.scrollTo(prevScrollX, prevScrollY);
        }
    };

    /* ========= мӢңмһ‘ ========= */
    window.addEventListener('DOMContentLoaded', () => {
        initDiagram();
        hookIO();

        const overlay  = document.getElementById('diagramOverlay');
        if (overlay) overlay.style.pointerEvents = 'auto';

        resizeOverlay();
        adjustFlowRowHeight();
        wireAutosizeAll();
        autosizeAllTextareas();
        window.addEventListener('resize', resizeOverlay);

        // PII нҢЁл„җ мҙҲкё°н–ү н•ҳлӮҳ мғқм„ұ
        clearAllPIIRows();
    });
</script>
</body>
</html>
