<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EPIA 개인정보 흐름도</title>

    <!-- GoJS -->
    <script src="https://cdn.jsdelivr.net/npm/gojs@3.0.22/release/go.js"></script>
    <script src="https://gojs.net/latest/extensions/Figures.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        :root{
            --bg:#f5f7fa;
            --header:#2f6fb0;
            --header-text:#fff;
            --col-header:#e5e7eb;
            --grid:#cbd5e1;
            --border:#9ca3af;
            --leftcol:#eef2f7;

            --left-w:90px;    /* 행 라벨 열 */
            --col-w:210px;     /* 수집/보유/... 각 단계 열 넓이 */

            --cell-min-h:50px;

            --palette-w:160px;
            --layout-gap:10px;
            --pii-panel-w:180px;

            /* 버튼 공통 */
            --btn-radius: 9999px;
            --btn-shadow: 0 1px 3px rgba(15, 23, 42, 0.12);
            --btn-shadow-hover: 0 4px 10px rgba(15, 23, 42, 0.18);

            /* 색상 팔레트 */
            --btn-primary-bg: linear-gradient(135deg,#38bdf8,#22c55e); /* 희망찬 느낌 */
            --btn-primary-border: rgba(56,189,248,0.3);

            --btn-danger-bg: #fee2e2;
            --btn-danger-border: #fecaca;
            --btn-danger-text: #b91c1c;

            --btn-positive-bg: #ecfdf5;
            --btn-positive-border: #6ee7b7;
            --btn-positive-text: #15803d;

            --btn-color-bg: #b9d1ee;
            --btn-color-border: #6392cb;
            --btn-color-text: #0f3869;

            --btn-neutral-bg: #eef2f7;
            --btn-neutral-border: #cbd5e1;

            --btn-neutral-strong-bg: #e5e7eb;
            --btn-neutral-strong-text: #374151;



            /* 우려사항 토글용 */
            --btn-toggle-on-bg: #f5f3ff;   /* 보임: 보라 계열 */
            --btn-toggle-on-border: #a855f7;
            --btn-toggle-on-text: #6d28d9;

            --btn-toggle-off-bg: #fffbeb;  /* 숨김: 주황 계열 */
            --btn-toggle-off-border: #f97316;
            --btn-toggle-off-text: #9a3412;
        }

        *{box-sizing:border-box;}
        body{
            margin:0;
            background:var(--bg);
            font-family:system-ui,-apple-system,Segoe UI,Roboto,Apple SD Gothic Neo,Malgun Gothic,sans-serif;
        }
        .page{
            max-width:1540px;      /* 전체 폭 */
            margin:16px auto;
            padding:10px;
        }

        .toolbar{
            margin:6px 0 12px 6px;
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }
        .toolbar button{
            position: relative;
            display:inline-flex;
            align-items:center;
            gap:6px;
            padding:7px 14px;
            font-size:14px;
            line-height:1.3;
            cursor:pointer;
            border-radius:var(--btn-radius);
            border:1px solid transparent;
            background:#ffffff;
            color:#111827;
            box-shadow:var(--btn-shadow);
            transition:
                background-color 0.12s ease,
                border-color 0.12s ease,
                box-shadow 0.12s ease,
                transform 0.06s ease,
                color 0.12s ease;
            white-space:nowrap;
        }
        .toolbar button:hover{
            box-shadow:var(--btn-shadow-hover);
            transform:translateY(-0.5px);
        }
        .toolbar button:active{
            transform:translateY(0);
            box-shadow:0 0 0 rgba(0,0,0,0.1);
        }

        /* 희망찬: 흐름표에서 불러오기 */
        .btn.btn-primary{
            background-image:var(--btn-primary-bg);
            color:#f9fafb;
            border-color:var(--btn-primary-border);
            font-weight:600;
        }
        .btn.btn-primary:hover{
            filter:brightness(1.02);
        }

        /* 경고: 삭제 계열 */
        .btn.btn-danger{
            background:var(--btn-danger-bg);
            border-color:var(--btn-danger-border);
            color:var(--btn-danger-text);
            font-weight:600;
        }
        .btn.btn-danger:hover{
            background:#fecaca;
        }

        /* 밝은 느낌: 항목 추가 */
        .btn.btn-positive{
            background:var(--btn-positive-bg);
            border-color:var(--btn-positive-border);
            color:var(--btn-positive-text);
            font-weight:600;
        }
        .btn.btn-positive:hover{
            background:#dcfce7;
        }

        /* 중립: 링크 스타일/색 토글 */
        .btn.btn-neutral{
            background:var(--btn-neutral-bg);
            border-color:var(--btn-neutral-border);
            color:#111827;
        }

        /* 사무적인 중립: 편집 모드 */
        .btn.btn-neutral-strong{
            background:var(--btn-neutral-strong-bg);
            border-color:var(--btn-neutral-border);
            color:var(--btn-neutral-strong-text);
            font-weight:600;
        }

        /* 우려사항: 색 (JS에서 on/off 상태에 따라 색 바꿔줌) */
        .btn.btn-toggle-amb{
            background:var(--btn-toggle-on-bg);
            border-color:var(--btn-toggle-on-border);
            color:var(--btn-toggle-on-text);
            font-weight:600;
        }

        .frame{
            background:#fff;
            border:1.5px solid var(--border);
            border-radius:10px;
            position:relative;
            /* overflow:visible;  기본적으로 visible, 스크롤 막음 */
        }

        .bluebar{
            height:56px;
            background:var(--header);
            color:var(--header-text);
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:800;
            font-size:18px;
            border-top-left-radius:10px;
            border-top-right-radius:10px;
            flex-shrink:0;
        }

        /* ===== 메인 가로 레이아웃: [팔레트] [가운데 표+다이어그램] [PII 패널] */
        .main-row{
            display:flex;
            flex-direction:row;
            align-items:flex-start;
            justify-content:flex-start;
            gap:var(--layout-gap);
            padding:16px;
            /* 스크롤 제거 */
            overflow:visible;
        }

        /* ===== 팔레트 (이제 absolute 아님, 그냥 첫 컬럼으로 자리 잡음) ===== */
        #paletteCol{
            flex:0 0 var(--palette-w);
            max-width:var(--palette-w);
            margin-left: -8px;
        }
        #palette{
            width:100%;
            border:1px solid #bbb;
            background:#f8f9fb;
            border-radius:8px;
            box-shadow:0 4px 12px rgba(0,0,0,.08);
            height:600px;

            /* 스크롤 제거 */
            overflow:hidden;
        }

        /* ===== 가운데 표 컨테이너 ===== */
        #tableWrapOuter{
            position:relative;
            flex:0 0 auto;
        }
        .tableHeader{
            display:grid;
            grid-template-columns: var(--left-w) repeat(5, var(--col-w));
            border-bottom:1px solid var(--grid);
            background:var(--col-header);
            font-weight:700;
            font-size:16px;
        }
        .tableHeader>div{
            padding:10px 12px;
            border-right:1px solid var(--grid);
            text-align:center;
            white-space:pre-line;   /* ← \n 줄바꿈 인식 */
        }
        .tableHeader>div:last-child{border-right:none}

        /* 실제 표 영역 */
        #gridWrap{
            position:relative;
            border:1px solid var(--grid);
            border-top:none;
            background:#fff;
            overflow:visible;
        }

        #tableGrid{
            display:grid;
            grid-template-columns: var(--left-w) repeat(5, var(--col-w));
            font-size:16px;
            line-height:1.35;
        }

        /* 셀 공통사항 */
        .cell{
            min-height:0;
            border-right:1px solid var(--grid);
            border-bottom:1px solid var(--grid);
            padding:2px 4px;
            position:relative;
        }
        .cell:nth-child(6n){ border-right:none; } /* 6열마다 끊기 (라벨열+5단계=6칸) */

        .rowlabel{
            background:var(--leftcol);
            font-weight:700;
            display:flex;
            align-items:center;
            justify-content:center;
            white-space:pre-line;
            text-align:center;
            font-size:16px;
        }

        /* textarea 공통사항 */
        .cell textarea{
            width: 100%;
            height: auto;           /* scrollHeight로 키움 */
            min-height: 0;          /* 고정값 제거 */
            border: none;
            background: transparent;
            resize: none;           /* 사용자 드래그 금지 */
            overflow: hidden;       /* 내부 스크롤 제거 */
            font-size: 16px;
            line-height: 1.35;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 4px 6px;
            box-sizing: border-box;
        }
        .cell textarea:focus{
            outline:1px solid #60a5fa;
        }

        /* 처리흐름 셀 */
        .flow-row{
            align-items: stretch;
            min-height: 0 !important;
            height: auto !important;
            overflow: visible !important;
            padding: 0;
        }

        /* 설명 셀이 텍스트 높이에 맞춰 늘어나게 */
        .desc-row {
            align-items: stretch;
            min-height: 0 !important;
            height: auto !important;
            overflow: visible !important;
            padding: 0;
        }

        /* 우려사항 셀 */
        .concern-row {
            grid-column: span 5;
            min-height: 28px !important;
            height: auto !important;
            padding: 0;
        }
        .concern-visible {
            display: none;   /* 처음에는 숨김 상태 */
        }

        /* ===== GoJS 다이어그램 오버레이 (표 위에 겹침) ===== */
        #diagramOverlay{
            position:absolute;
            left:0;
            top:0;
            right:0;
            bottom:0;
            background:transparent;
            pointer-events:auto;
            border:none;
            z-index:10;
        }

        /* ===== 오른쪽 처리 개인정보 패널 ===== */
        #piiPanel{
            flex:0 0 auto;
            width:var(--pii-panel-w);
            border:1px solid var(--border);
            border-radius:8px;
            background:#fff;
            box-shadow:0 4px 12px rgba(0,0,0,.05);
            display:flex;
            flex-direction:column;
            max-height:none;
            height:auto;
            overflow:visible;
        }
        .piiPanelHeader{
            background:var(--col-header);
            border-bottom:1px solid var(--grid);
            border-top-left-radius:8px;
            border-top-right-radius:8px;
            font-weight:700;
            font-size:16px;
            text-align:center;
            padding:10px 8px;
            line-height:1.4;
        }
        #piiListScroll{
            flex:1 1 auto;
            padding:8px;
            font-size:16px;
            line-height:1.4;
            background:#fff;
            overflow:visible;
        }
        .piiRow{
            border-bottom:1px dashed var(--grid);
            padding:8px 6px;
            display:flex;
            flex-direction:row;
            align-items:stretch;
            gap:6px;
        }
        .piiRow:last-child{ 
            border-bottom:none; 
        }
        .pii-bullet{
            flex:0 0 auto;
            font-size:20px;
            font-weight:600;
            min-width:20px;
            text-align:center;
            line-height:1.4;
        }
        .pii-textwrap{
            flex:1 1 auto;
            width:100%;
        }
        .pii-textwrap textarea{
            width:100%;
            min-height:0px;
            border:none;
            background:transparent;
            resize:none;          /* 사용자가 드래그로 크기 변경 못함 */
            font-size:16px;
            line-height:1.35;
            padding:4px;
            height:auto;          /* 고정/최소 높이 제거 */
            white-space:pre-wrap; /* 줄바꿈 보존 */
            /* 텍스트가 늘면 스크롤 대신 높이 확장 */
            overflow:hidden;
        }
        .pii-textwrap textarea:focus{
            outline:1px solid #60a5fa;
        }

        /* 캡쳐 모드일 때 제외할 요소 숨기기 */
        .capture-mode #paletteCol,
        /* 한 줄 유지 + 콘텐츠 전체 폭으로 확장 */
        .capture-mode .frame {
            width: max-content !important;
        }
        .capture-mode .bluebar {
            position: static !important;
        }
        /* 캡쳐 시에도 좌/중앙/우(PII) 한 줄 유지를 강제 */
        .capture-mode .main-row {
            display: flex !important;
            flex-wrap: nowrap !important;     /* 줄바꿈 금지 */
            align-items: flex-start !important;
            width: max-content !important;     /* 콘텐츠 너비만큼 확장(뷰포트보다 넓어도 OK) */
        }
        /* 중앙 표+다이어그램 래퍼는 유동 폭(콘텐츠만큼) */
        .capture-mode #tableWrapOuter {
            flex: 0 0 auto !important;        /* 줄바꿈 방지 + 내용만큼 차지 */
            width: max-content !important;
        }
        /* 우측 PII 패널도 한 줄에 고정 */
        .capture-mode #piiPanel {
            position: static !important;       /* sticky/fixed 영향 제거, 루트 안에 포함 */
            flex: 0 0 auto !important;         /* 줄바꿈 방지 */
        }
    </style>
</head>
<body>
<div class="page">
    <div class="toolbar">
        <button id="fetchBtn" class="btn btn-primary" title="저장된 흐름표에서 흐름도를 초기화하여 불러옵니다">흐름표에서 불러오기</button>
        <button id="clearDiagramBtn" class="btn btn-danger" title="화면의 처리흐름을 삭제합니다">처리흐름 삭제</button>
        <button id="clearDescBtn" class="btn btn-danger" title="단계 설명을 모두 삭제합니다">설명 삭제</button>
        <button id="delRowBtn" class="btn btn-danger" title="마지막 처리 개인정보이 하나 삭제됩니다">처리 개인정보 삭제</button>
        <button id="addRowBtn" class="btn btn-positive" title="처리 개인정보이 하나 추가됩니다">처리 개인정보 추가</button>
        <button id="nodeColorBtn" class="btn btn-color" title="선택한 개체의 색상을 선택합니다">개체 색</button>
        <button id="nodeBorderColorBtn" class="btn btn-color" title="선택한 개체의 테두리 색상을 선택합니다">테두리 색</button>
        <button id="nodeTextColorBtn" class="btn btn-color" title="선택한 개체의 글자 색상을 선택합니다">글자 색</button>
        <button id="linkStyleToggleBtn" class="btn btn-neutral" title="링크의 선 모양이 변경됩니다">링크: 실선</button>
        <button id="linkColorToggleBtn" class="btn btn-neutral" title="링크의 선 색깔이 변경됩니다">링크: 검정</button>
        <button id="editModeToggleBtn" class="btn btn-neutral-strong">
            <span class="label">편집 모드: 흐름도</span>
        </button>
        <button id="CocernToggleBtn" class="btn btn-toggle-amb">
            <span class="label">우려사항: 보임</span>
        </button>
    </div>

    <div class="frame">
        <div class="bluebar" id="flowTitleBar">업무명 : </div>

        <div class="main-row">
            <!-- 팔레트 열 -->
            <div id="paletteCol">
                <div id="palette"></div>
            </div>

            <!-- 가운데 표 + 다이어그램 -->
            <div id="tableWrapOuter">
                <div class="tableHeader">
                    <div>생명주기</div>
                    <div>수집</div>
                    <div>보유</div>
                    <div>이용</div>
                    <div>제공</div>
                    <div>파기</div>
                </div>

                <div id="gridWrap">
                    <div id="tableGrid">
                        <!-- Row 1: 처리흐름 -->
                        <div class="cell rowlabel" data-rowtype="flow">처리흐름</div>
                        <div class="cell flow-row" data-col="collect"><textarea></textarea></div>
                        <div class="cell flow-row" data-col="retain"><textarea></textarea></div>
                        <div class="cell flow-row" data-col="use"><textarea></textarea></div>
                        <div class="cell flow-row" data-col="provide"><textarea></textarea></div>
                        <div class="cell flow-row" data-col="discard"><textarea></textarea></div>

                        <!-- Row 2: 단계 설명 -->
                        <div class="cell rowlabel" data-rowtype="desc">설명</div>
                        <div class="cell desc-row autosize-target" data-phase="collect"><textarea class="desc-collect"></textarea></div>
                        <div class="cell desc-row autosize-target" data-phase="retain"><textarea class="desc-retain"></textarea></div>
                        <div class="cell desc-row autosize-target" data-phase="use"><textarea class="desc-use"></textarea></div>
                        <div class="cell desc-row autosize-target" data-phase="provide"><textarea class="desc-provide"></textarea></div>
                        <div class="cell desc-row autosize-target" data-phase="discard"><textarea class="desc-discard"></textarea></div>

                        <!-- === Row 3: 우려사항 === -->
                        <div class="cell rowlabel concern-visible">우려사항</div>
                        <div class="cell concern-row concern-visible" data-col="concern"><textarea class="concern-text"></textarea></div>
                    </div>

                    <!-- 다이어그램은 표 위에 겹친다 -->
                    <div id="diagramOverlay"></div>
                </div>
            </div>

            <!-- 오른쪽 처리 개인정보 패널 -->
            <div id="piiPanel">
                <div class="piiPanelHeader">처리 개인정보</div>
                <div id="piiListScroll">
                    <!-- 동적 행 -->
                </div>
            </div>
        </div> <!-- /main-row -->
    </div> <!-- /frame -->
</div>

<!-- ===== 개체 색상 선택용 컬러 피커 ===== -->
<input
  id="nodeColorInput"
  type="color"
  style="position: fixed; right: 12px; bottom: 12px; opacity: 0; width: 1px; height: 1px; pointer-events: none;"
/>
<!-- ===== 개체 테두리 색상 선택용 컬러 피커 ===== -->
<input
  id="nodeBorderColorInput"
  type="color"
  style="position: fixed; right: 12px; bottom: 12px; opacity: 0; width: 1px; height: 1px; border: 0; padding: 0;
    pointer-events: none; z-index: 999999;"
/>
<!-- ===== 글자 색상 선택용 컬러 피커 ===== -->
<input
  id="nodeTextColorInput"
  type="color"
  style="position: fixed; right: 12px; bottom: 12px; opacity: 0; width: 1px; height: 1px; border: 0; padding: 0;
    pointer-events: none; z-index: 999999;"
/>

<script>
    /* ====== GoJS 라이선스 ====== */
    (() => {
        const key = new URLSearchParams(location.search).get("gojs_key");
        if (key) go.Diagram.licenseKey = key;
    })();

    /* ========= 레이아웃/좌표 계산 ========= */
    function getMetrics() {
        const rootStyles = getComputedStyle(document.documentElement);
        const leftW = parseFloat(rootStyles.getPropertyValue('--left-w'));
        const colW  = parseFloat(rootStyles.getPropertyValue('--col-w'));

        // gridWrap 기준으로 계산
        const gridWrap = document.getElementById('gridWrap');
        const gridRect = gridWrap.getBoundingClientRect();

        // overlay는 "수집~파기" 5열 위에만 올려야 하므로 overlay의 left는 leftW 만큼 우측으로 밀려야 함
        const offsetLeft = leftW;
        const overlayW   = colW * 5;

        // 다이어그램을 위에서 살짝 띄우는 값 (원하는 만큼 조절)
        const GAP_TOP = 16;

        const overlayH = gridRect.height - GAP_TOP;

        return {
            offsetLeft,
            offsetTop: GAP_TOP,
            width:overlayW,
            height:overlayH,
            leftW, colW
        };
    }

    function resizeOverlay(){
        const m = getMetrics();
        const overlay = document.getElementById('diagramOverlay');
        overlay.style.left   = m.offsetLeft + 'px';
        overlay.style.top    = m.offsetTop  + 'px';
        overlay.style.width  = m.width + 'px';
        overlay.style.height = m.height + 'px';
        autosizeAllTextareas();
    }

    // 원하는 한 줄 높이(px)
    const BASE_LINE_PX = 30;

    function autosizeAllTextareas(){
        document.querySelectorAll('.cell textarea').forEach(ta=>{
            ta.style.overflow = 'hidden';
            ta.style.minHeight = '0px';

            const cell = ta.closest('.cell');

            // 1) 우선 모두 "한 줄" 높이로 맞춰 놓고
            ta.style.height = BASE_LINE_PX + 'px';

            let h = BASE_LINE_PX;

            if (ta.value) {
                // 2) 한 줄 높이에서 실제 필요한 높이를 다시 측정
                const needed = ta.scrollHeight;

    go.Shape.defineFigureGenerator("Star5", function(shape, w, h) {
    const geo = new go.Geometry();
    const fig = new go.PathFigure(w * 0.5, 0, true);
    // 5각 별 좌표 (정규화된 0~1 범위)
    const points = [
        0.5, 0,
        0.618, 0.382,
        1, 0.382,
        0.691, 0.618,
        0.809, 1,
        0.5, 0.76,
        0.191, 1,
        0.309, 0.618,
        0, 0.382,
        0.382, 0.382
    ];
    // PathFigure에 점 추가
    for (let i = 0; i < points.length; i += 2) {
        fig.add(new go.PathSegment(go.PathSegment.Line,
        points[i] * w,
        points[i + 1] * h
        ));
    }
    geo.add(fig);
    geo.normalize();
    return geo;

                let i = 0, n = 0;
                if (siblings) { siblings.each(l => { if (l === link) i = n; n++; }); }

                const step = 22, mid = (n - 1) / 2;
                return (i - mid) * step;
            });

    /* ====== 노드 높이 기반으로 처리흐름 행 높이 자동 조정 ====== */
    function adjustFlowRowHeight() {
        if (!myDiagram) return;

        // 다이어그램의 노드 중 가장 아래쪽(y+height) 위치 계산
        let maxY = 0;
        myDiagram.nodes.each(node => {
            const b = node.actualBounds;
            const bottom = b.y + b.height;
            if (bottom > maxY) maxY = bottom;
        });

        // 약간의 여백 추가
        const targetH = Math.ceil(maxY + 80);  // 80px 여백

        // CSS 변수 업데이트
        document.documentElement.style.setProperty('--cell-min-h', `${targetH}px`);

        // 실제 셀 스타일도 강제로 갱신
        document.querySelectorAll('.flow-row, .cell.rowlabel[data-rowtype="flow"]').forEach(el => {
            el.style.minHeight = `${targetH}px`;
            el.style.height = `${targetH}px`;
        });

        // overlay 영역 다시 계산
        resizeOverlay();
    }

    /* ========= 원형숫자 만들기 (PII와 흐름도에서 사용) ========= */
    function numToCircle(n){
        if (n >= 1 && n <= 20) {
            return String.fromCharCode(0x2460 + (n - 1));
        }
        // ㉑(21)~㊿(50)
        if (n >= 21 && n <= 35) {
            return String.fromCharCode(0x3250 + (n - 20)); // ㉑은 U+3251 (0x3250 + 1)
        }
        if (n >= 36 && n <= 50) {
            return String.fromCharCode(0x32B1 + (n - 35));
        }
    }

    /* ========= PII 패널 ========= */
    function buildPIIRowDom(idx, initialVal){
        const row = document.createElement('div');
        row.className = 'piiRow';
        row.setAttribute('data-type','pii');

        const bullet = document.createElement('div');
        bullet.className = 'pii-bullet';
        bullet.textContent = numToCircle(idx);

        const wrap = document.createElement('div');
        wrap.className = 'pii-textwrap';

        const ta = document.createElement('textarea');

        wrap.appendChild(ta);
        row.appendChild(bullet);
        row.appendChild(wrap);
        return row;

    function formatPIIItem(item){

        if (typeof item === "string") return item;
        if (item.id || item.fields){

            const body = Array.isArray(item.fields) ? item.fields.join(", ") : "";
            return head + (body ? " : " + body : "");

    // ===== PII textarea 자동 높이(동적 추가까지 대응) =====
    (function () {
        const ROOT_ID = 'piiListScroll';
        const SEL = `#${ROOT_ID} textarea`;

        function autoResize(ta) {
            ta.style.height = 'auto';
            ta.style.height = ta.scrollHeight + 'px';
        }
        function wire(ta) {
            if (!ta || ta._wired) return;
            ta._wired = true;
            ta.style.overflow = 'hidden';   // 내부 스크롤 숨김
            ta.style.height = 'auto';
            ta.addEventListener('input', () => autoResize(ta));
            // 폰트/레이아웃 적용 직후 한번 더
            requestAnimationFrame(() => autoResize(ta));
        }
        function scanAll() {
            document.querySelectorAll(SEL).forEach(wire);
        }

        // 초기 DOM 완성/리소스 로드 후 1회
        document.addEventListener('DOMContentLoaded', scanAll);
        window.addEventListener('load', scanAll);

        // 동적 추가(렌더/append) 감시
        function observe() {
            const root = document.getElementById(ROOT_ID);
            if (!root) return;
            new MutationObserver(muts => {
                for (const m of muts) {
                    for (const n of m.addedNodes) {
                        if (n.nodeType !== 1) continue;
                        if (n.matches?.('textarea')) wire(n);
                        n.querySelectorAll?.('textarea').forEach(wire);
                    }
                }
            }).observe(root, { childList: true, subtree: true });
        }
        observe();
    })();

        mapping.forEach(([phase, sel])=>{

            ta.value = (typeof v === "string" ? v : Array.isArray(v) ? v.join("\n") : "");
            ta.style.height = "auto"; // 자동 높이 처리(스크롤 방지)
            ta.style.height = (ta.scrollHeight) + "px";

    // ========= 화면 상태 -> combined 공통 빌더 & 자동 저장 =========

    // derived 자동 저장 (debounce)
    function scheduleAutosave(opts = {}) {
        const force = opts.force === true;
        if (suppressAutosave) return;
        if (!companyId || !taskId) return;
        if (!force && myDiagram?.undoManager?.isUndoingRedoing) return; // 일반 편집은 Undo/Redo 중 예약 안 함

        if (autosaveTimer) clearTimeout(autosaveTimer);
        autosaveTimer = setTimeout(async () => {
            try {
                myDiagram.skipsUndoManager = true; // autosave 중 모델 변경이 있더라도 Undo에 남기지 않음
                const combined = buildCombinedFromCurrentScreen();
                if (!combined) return;
                await saveCombinedToDB(combined);
                console.log("derived 자동 저장 완료");
            } catch (e) {
                console.warn("derived 자동 저장 실패:", e);
            } finally {
                if (myDiagram) myDiagram.skipsUndoManager = false;
            }
        }, 1000); // 1초 동안 입력 없으면 저장
    }
    function cancelAutosaveTimer() {
        if (autosaveTimer) {
            clearTimeout(autosaveTimer);
            autosaveTimer = null;
        }
    }

    // ===== Backend API base URL helper =====
    function getAPIBase() {
        // 1) 부모(React) window에 설정된 값 우선 사용
        try {
            if (window.parent && window.parent !== window) {
                const v = window.parent.__API_BASE__;
                if (typeof v === 'string' && v.length > 0) {
                    return v;         // 예: "/flow"
                }
            }
        } catch (e) {
            // cross-origin이면 여기서 에러
        }

        // 2) 혹시라도 iframe 자기 window에 값이 있으면 사용
        if (typeof window.__API_BASE__ === 'string' && window.__API_BASE__.length > 0) {
            return window.__API_BASE__;
        }

        // 3) 그래도 없으면 로컬 개발용 기본값
        return 'http://localhost:8000';
    }

    /* online 여부로 category 정규화 & link 스타일 정규화 */
    function normalizeDiagram(diagram){
        const patched = JSON.parse(JSON.stringify(diagram||{}));
        if (!patched.nodeDataArray) patched.nodeDataArray = [];
        if (!patched.linkDataArray) patched.linkDataArray = [];

        patched.nodeDataArray = patched.nodeDataArray.map(nd => {
            if (nd.category === "system"){
                if (nd.online === false){ nd.category = "system_offline"; }
            } else if (nd.category === "database"){
                if (nd.online === false){ nd.category = "database_offline"; }
            } else if (nd.category === "discard"){
                if (nd.online === false){ nd.category = "discard_offline"; }
            }
            return nd;
        });

        patched.linkDataArray = patched.linkDataArray.map(ld => {
            // 최초 로드 시 노드 관통 방지: 저장돼 온 좌표는 버려 재계산 유도
            delete ld.points;

            if (typeof ld.online === "boolean"){
                ld.category = ld.online ? "solid" : "dashed";
            }
            return ld;
        });
        return patched;
    }

    /* 같은 노드쌍(from,to)에서 색(검정/빨강)별로 링크 합치기
       - JSON의 text를 그대로 사용
       - 같은 색상 그룹에서 text를 모아 중복 제거 후 "A, B, C"로 결합
       - 결과: 그룹별 최대 1개(검정 1개, 빨강 1개) → 전체 최대 2개 */
    function mergeLinksByColor(diagram){
        if (!diagram) return;
        const model = diagram.model;
        const groups = new Map(); // key = `${from}|${to}|${stroke}`

        diagram.links.each(l => {
            const d = l.data || {};
            const from = d.from, to = d.to;
            if (from == null || to == null) return;
            const color = (d.stroke && String(d.stroke)) || "black"; // 온라인여부=색
            const key = `${from}|${to}|${color}`;
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(l);
        });

        model.commit(m => {
            groups.forEach(list => {
                if (list.length <= 1) return;

                // 1) 라벨 수집(있는 그대로), 중복 제거(순서 보존)
                const labels = [];
                list.forEach(l => {
                    const t = (l.data && l.data.text != null) ? String(l.data.text).trim() : "";
                    if (t) labels.push(t);
                });
                const uniq = Array.from(new Set(labels));      // ["5","6","7"] 또는 ["PII-5","PII-7"]

                // 2) 첫 링크만 남기고 나머지는 제거
                const base = list[0];
                for (let i=1; i<list.length; i++) {
                    m.removeLinkData(list[i].data);
                }

                // 3) 결합 라벨 적용 ("5, 6, 7" 또는 "abc, def")
                const label = uniq.join(", ");
                m.setDataProperty(base.data, "text", label);

                // 4) 포인트 초기화해 재라우팅 유도
                m.setDataProperty(base.data, "points", undefined);
            });
        }, "merge-links-by-color");

        // 겹침 완화: 포트 재배치 + 재라우팅
        rerouteAllLinks(myDiagram);
        diagram.links.each(l => l.invalidateRoute());
    }

    function rerouteAllLinks(diagram){
        // 모델은 건드리지 말고 "렌더링 경로"만 다시 계산시키기
        diagram.links.each(l => l.invalidateRoute());
        diagram.requestUpdate();
    }

    // combined 객체를 화면에 반영(제목/다이어그램/PII/설명)하는 공통 함수
    async function applyCombinedToScreen(combined){
        cancelAutosaveTimer(); // 이전에 걸려 있던 자동저장 타이머는 취소
        suppressAutosave = true;
        try{
            const diagram  = combined?.diagram;
            const pii      = combined?.pii;
            const desc     = combined?.description;
            const concern  = combined?.concern;

            // 파란 타이틀바: 모델에 없으면 DB에서 taskName 조회
            let flowTitle = (diagram && diagram.modelData && diagram.modelData.flowTitle) || "";
            if (!flowTitle) {
                try { flowTitle = await fetchTaskNameFromDB(); } catch {}
            }
            const bar = document.getElementById('flowTitleBar');
            if (bar) bar.textContent = `업무명 : ${flowTitle || "미정"}`;

            // 다이어그램
            if (diagram){
                const normalized = normalizeDiagram(diagram);
                myDiagram.model = go.Model.fromJson(normalized);

                // 로드 직후 1회: 재라우팅 + 링크병합
                (function kickRerouteAndMergeOnce(diagram){
                    diagram.links.each(l => l.invalidateRoute());
                    const once = () => {
                        diagram.removeDiagramListener("ViewportBoundsChanged", once);
                        diagram.links.each(l => l.invalidateRoute());
                        diagram.layoutDiagram(true);
                        rerouteAllLinks(diagram);
                        mergeLinksByColor(diagram);
                        diagram.updateAllTargetBindings();
                    };
                    diagram.addDiagramListener("ViewportBoundsChanged", once);
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            diagram.links.each(l => l.invalidateRoute());
                            diagram.layoutDiagram(true);
                            rerouteAllLinks(diagram);
                            mergeLinksByColor(diagram);
                            diagram.updateAllTargetBindings();
                        });
                    });
                })(myDiagram);
            }

            // 처리 개인정보 반영하기
            if (Array.isArray(pii)) {
                renderPIIFromJSON(pii);
            }
            // 설명 반영하기
            fillDescriptions(desc || {});
            // 우려사항 반영하기
            setConcernText(combined?.concern || "");
            // 우려사항이 존재하면 자동으로 보임 처리
            const hasConcern = combined?.concern && String(combined.concern).trim().length > 0;
            if (hasConcern) setConcernVisible(true);
        } finally {
            suppressAutosave = false;
        }
    }

    // derived에 의미 있는 내용이 있는지 확인
    function hasMeaningfulContent(combined) {
        if (!combined) return false;
        if (combined.diagram && Array.isArray(combined.diagram.nodeDataArray) && combined.diagram.nodeDataArray.length) return true;
        if (Array.isArray(combined.pii) && combined.pii.length) return true;
        if (combined.description && typeof combined.description === "object") {
            if (Object.values(combined.description).some(v => v && String(v).trim().length > 0)) return true;
        }
        if (combined.concern && String(combined.concern).trim().length > 0) return true;
        return false;
    }
    // 최초 진입 시 derived가 있다면 자동으로 화면에 반영

    /* ========= 버튼/IO ========= */
    function hookIO(){
        // const box = document.getElementById('modelBox'); (modelBox 삭제)
        // === 공통: 로드 직후 1회 강제 라우팅 & 병합 ===
        function kickRerouteAndMergeOnce(diagram){
            // 1) 즉시 한 번 가볍게 깨우기
            diagram.links.each(l => l.invalidateRoute());

            // 2) 실제 뷰포트 배치가 끝난 시점에 1회 실행
            const once = () => {
                diagram.removeDiagramListener("ViewportBoundsChanged", once);
                diagram.links.each(l => l.invalidateRoute());
                diagram.layoutDiagram(true);                  // ★ bounds 보장
                rerouteAllLinks(diagram);
                mergeLinksByColor(diagram);
                diagram.updateAllTargetBindings();
            };
            diagram.addDiagramListener("ViewportBoundsChanged", once);

            // 3) 혹시 이벤트가 환경 따라 안 뜨는 경우 백업: rAF × 2
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    diagram.links.each(l => l.invalidateRoute());
                    diagram.layoutDiagram(true);
                    rerouteAllLinks(diagram);
                    mergeLinksByColor(diagram);
                    diagram.updateAllTargetBindings();
                });
            });
        }

        // '흐름표에서 불러오기' = 서버에서 build 실행 후 흐름표 정보를 derived에 초기화
        document.getElementById('fetchBtn').onclick = async () => {
            const ok = window.confirm(
                "현재 화면을 흐름표 정보로 초기화합니다.\n계속하시겠습니까?"
            );
            if (!ok) return; // 사용자가 '아니오' 선택 시 아무것도 하지 않음

            // 빌드/재렌더 하는 동안 자동저장 막기
            suppressAutosave = true;
            cancelAutosaveTimer();         
            try {
                await triggerBuildOnServer();                      // build
                const combined = await fetchCombinedFromDB();      // 최신 derived
                await applyCombinedToScreen(combined);
            } catch (e) {
                console.error('흐름표에서 불러오기 실패:', e);
                alert('흐름표에서 불러오기에 실패했습니다.\n흐름표 탭으로 이동하여 확인하세요.');
            } finally {
                suppressAutosave = false;
            }
        };

        /* '저장' = 현재 화면 상태를 DB derived로 저장 (현재 자동저장이 활성화되어 주석처리 함)
        document.getElementById('saveBtn').onclick = async () => {
            try {
                const combined = buildCombinedFromCurrentScreen();
                if (!combined) return;

                // 텍스트박스에도 넣고(기존 로직 유지)
                box.value = JSON.stringify(combined, null, 2);
                myDiagram.isModified = false;

                // 서버 저장
                await saveCombinedToDB(combined);
                alert('저장되었습니다.');
            } catch (e) {
                console.error('저장 실패:', e);
                alert('저장 실패 (서버 확인 바랍니다)');
            }
        }; */

        /* '불러오기' = DB에 저장된 derived 그대로 화면에 출력 (현재 자동저장이 활성화되어 주석처리 함)
        document.getElementById('loadBtn').onclick = async () => {
            try{
                const combined = await fetchCombinedFromDB();  // 빌드 없이 가져옴
                await applyCombinedToScreen(combined);
            }catch(e){
                console.error('불러오기 실패:', e);
                alert('불러오기 실패 (서버 /api/combined 확인)');
            }
        }; */

        // 처리흐름 삭제 기능
        const clearDiagramBtn = document.getElementById('clearDiagramBtn');
        if (clearDiagramBtn) {
            clearDiagramBtn.onclick = () => {
                if (!confirm('처리흐름을 삭제합니다.\n계속하시겠습니까?')) return;
                clearDiagram();
            };
        }

        // 설명 삭제 기능
        const clearDescBtn = document.getElementById('clearDescBtn');
        if (clearDescBtn) {
            clearDescBtn.onclick = () => {
                const ok = window.confirm(
                    '각 단계별 설명의 내용을 모두 삭제합니다.\n계속하시겠습니까?'
                );
                if (!ok) return;

                // 설명 텍스트박스 모두 비우기
                const descTextareas = document.querySelectorAll('.desc-row textarea');
                descTextareas.forEach((ta) => {
                    ta.value = '';
                });

                // 높이/레이아웃 갱신
                if (typeof autosizeAllTextareas === 'function') {
                    autosizeAllTextareas();
                }
                resizeOverlay?.();

                // 자동저장 트리거
                scheduleAutosave();
            };
        }

        // 처리 개인정보 추가
        document.getElementById('addRowBtn').onclick = () => {
            addPIIRow("");
        };
        // 처리 개인정보 삭제
        const delRowBtn = document.getElementById("delRowBtn");
        if (delRowBtn) {
            delRowBtn.onclick = () => {
                const ok = window.confirm(
                    "마지막 처리 개인정보를 삭제합니다.\n삭제하시겠습니까?"
                );
                if (!ok) return;  // 취소 시 종료

                delLastPIIRow();   // 삭제 로직 호출
                scheduleAutosave();   // 자동 저장 트리거
            };
        }
        /* 처리 개인정보 모두 비우기 기능
        const clearPIIBtn = document.getElementById('clearPIIBtn');
        if (clearPIIBtn){
            clearPIIBtn.onclick = () => {
                if (!confirm('처리 개인정보를 모두 비울까요?')) return;
                clearAllPIIRows();
                renumberPIIRows();
            };
        } */

        // 개체 색 선택
        const nodeColorBtn = document.getElementById("nodeColorBtn");
        const colorInput = document.getElementById("nodeColorInput");
        
        function refreshNodeColorBtn(){  // 선택 상태에 따라 버튼 활성/비활성
            if (!nodeColorBtn) return;
            const hasNodeSelected = myDiagram && myDiagram.selection.any(p => p instanceof go.Node);
            nodeColorBtn.disabled = !hasNodeSelected;
        }
        myDiagram.addDiagramListener("ChangedSelection", refreshNodeColorBtn);
        refreshNodeColorBtn();
        if (nodeColorBtn && colorInput) {  // 버튼 클릭 -> 컬러피커 열기 -> 선택 노드들에 적용
            nodeColorBtn.onclick = () => {
                const firstNode = myDiagram.selection.first();
                if (!(firstNode instanceof go.Node)) return;
                // 현재 선택된 첫 노드의 색을 기본값으로
                colorInput.value = (firstNode.data && firstNode.data.fill) || "#ffffff";
                // onchange는 매번 덮어써서 중복 방지
                colorInput.onchange = () => {
                    setSelectedNodesFillColor(colorInput.value);
                };
                colorInput.click();
            };
        }

        // 개체 테두리 색 선택
        const nodeBorderColorBtn = document.getElementById("nodeBorderColorBtn");
        const borderColorInput  = document.getElementById("nodeBorderColorInput");

        function refreshBorderColorBtn(){
            if (!nodeBorderColorBtn) return;
            const hasNodeSelected = myDiagram && myDiagram.selection.any(p => p instanceof go.Node);
            nodeBorderColorBtn.disabled = !hasNodeSelected;
        }
        myDiagram.addDiagramListener("ChangedSelection", () => {
            refreshBorderColorBtn();
        });
        refreshBorderColorBtn();
        if (nodeBorderColorBtn && borderColorInput) {
            nodeBorderColorBtn.onclick = () => {
                const firstNode = myDiagram.selection.first();
                if (!(firstNode instanceof go.Node)) return;
                // 현재 테두리 색을 기본값으로
                borderColorInput.value = (firstNode.data && firstNode.data.stroke) || "#374151";
                borderColorInput.onchange = () => {
                    setSelectedNodesBorderColor(borderColorInput.value);
                };
                borderColorInput.click();
            };
        }

        // 글자 색 선택
        const nodeTextColorBtn = document.getElementById("nodeTextColorBtn");
        const textColorInput = document.getElementById("nodeTextColorInput");

        function refreshTextColorBtn(){
            if (!nodeTextColorBtn) return;
            const hasNodeSelected = myDiagram && myDiagram.selection.any(p => p instanceof go.Node);
            nodeTextColorBtn.disabled = !hasNodeSelected;
        }
        myDiagram.addDiagramListener("ChangedSelection", () => {
            refreshTextColorBtn();
            // 기존 노드 fill 버튼 refreshNodeColorBtn도 이미 달아놨으면 같이 호출해도 됨
        });
        refreshTextColorBtn();
        if (nodeTextColorBtn && textColorInput) {
            nodeTextColorBtn.onclick = () => {
                const firstNode = myDiagram.selection.first();
                if (!(firstNode instanceof go.Node)) return;
                textColorInput.value = (firstNode.data && firstNode.data.textStroke) || "#111827";
                textColorInput.onchange = () => {
                    setSelectedNodesTextColor(textColorInput.value);
                };
                textColorInput.click();
            };
        }


        // 링크 스타일/색상 토글
        const styleBtn = document.getElementById('linkStyleToggleBtn');
        const colorBtn = document.getElementById('linkColorToggleBtn');
        let currentLinkStyle = 'solid';
        let currentLinkColor = 'black';

        function applyLinkArchetype(){
            myDiagram.toolManager.linkingTool.archetypeLinkData = {
                category: currentLinkStyle,
                stroke: currentLinkColor,
            };
        }
        function refreshLinkButtonsUI(){
            if (styleBtn){
                const isDashed = currentLinkStyle === 'dashed';
                styleBtn.textContent = `링크: ${isDashed ? '점선' : '실선'}`;
                styleBtn.style.borderColor = '#111827';
                styleBtn.style.borderStyle = isDashed ? "dashed" : "solid";
            }
            if (colorBtn){
                const isRed = currentLinkColor === 'red';
                colorBtn.textContent = `링크: ${isRed ? '빨강' : '검정'}`;
                colorBtn.style.color = isRed ? 'red' : '#111827';
                colorBtn.style.borderColor = isRed ? 'red' : '#111827';
            }
        }
        if (styleBtn) styleBtn.onclick = () => {
            currentLinkStyle = (currentLinkStyle === 'solid') ? 'dashed' : 'solid';
            applyLinkArchetype();
            refreshLinkButtonsUI();
        };
        if (colorBtn) colorBtn.onclick = () => {
            currentLinkColor = (currentLinkColor === 'black') ? 'red' : 'black';
            applyLinkArchetype();
            refreshLinkButtonsUI();
        };
        applyLinkArchetype();
        refreshLinkButtonsUI();

        // 편집/입력 모드 토글 (diagramOverlay 클릭 가능/불가만 전환)
        const editBtn = document.getElementById('editModeToggleBtn');
        function setEditMode(isDiagramEdit){
            const overlay = document.getElementById('diagramOverlay');
            const label = editBtn?.querySelector('.label');
            if (!overlay || !label) return;

            if (isDiagramEdit){
                overlay.style.pointerEvents = 'auto';
                label.textContent = '편집 모드: 흐름도';
                editBtn.setAttribute('aria-pressed','true');
            }else{
                overlay.style.pointerEvents = 'none';
                label.textContent = '편집 모드: 텍스트';
                editBtn.setAttribute('aria-pressed','false');
            }
        }
        editBtn && (editBtn.onclick = () => {
            const overlay = document.getElementById('diagramOverlay');
            const nowInputMode = overlay && (overlay.style.pointerEvents === 'none' || !overlay.style.pointerEvents);
            setEditMode(nowInputMode);
        });
        setEditMode(true);
    }

        // 우려사항 보임/숨김 토글
        function setConcernVisible(visible) {
            const rows = document.querySelectorAll(".concern-visible");
            rows.forEach(r => {
                if (!visible) {
                    r.style.display = "none";
                } else {
                    if (r.classList.contains("rowlabel")) {
                        r.style.display = "flex";   // 가운데 정렬 유지
                    } else {
                        r.style.display = "block";
                    }
                }
            });

            const btn = document.getElementById("CocernToggleBtn");
            if (btn) {
                const label = btn.querySelector(".label");
                if (label) label.textContent = visible ? "우려사항: 보임" : "우려사항: 숨김";

                // 우려사항 보임⇄숨김 토글될 때 색 계열 변화
                if (visible) {
                    btn.style.background = getComputedStyle(document.documentElement)
                        .getPropertyValue('--btn-toggle-on-bg');
                    btn.style.borderColor = getComputedStyle(document.documentElement)
                        .getPropertyValue('--btn-toggle-on-border');
                    btn.style.color = getComputedStyle(document.documentElement)
                        .getPropertyValue('--btn-toggle-on-text');
                } else {
                    btn.style.background = getComputedStyle(document.documentElement)
                        .getPropertyValue('--btn-toggle-off-bg');
                    btn.style.borderColor = getComputedStyle(document.documentElement)
                        .getPropertyValue('--btn-toggle-off-border');
                    btn.style.color = getComputedStyle(document.documentElement)
                        .getPropertyValue('--btn-toggle-off-text');
                }
            }

            autosizeAllTextareas();
            resizeOverlay();
        }
        // 초기 상태 → 숨김 유지
        setConcernVisible(false);
        // 버튼 연결
        document.getElementById("CocernToggleBtn").onclick = () => {
            const row = document.querySelector(".concern-visible");
            const isVisible = row && row.style.display !== "none";
            setConcernVisible(!isVisible);
        };

    /* ========= 기타 유틸 ========= */
    function clearDiagram(){
        const empty = new go.GraphLinksModel();
        myDiagram.model = empty;
        myDiagram.clearSelection();
        myDiagram.isModified = true;
    }

    // 나중에 필요하면 top-left 정렬 로직 넣을 자리
    function alignTopLeftAfterLoad(){}

    // 부모(React) → 자식(iframe:flow1.html) 메시지 처리
    window.addEventListener("message", async (ev) => {
        const data = ev.data || {};
        if (!data || typeof data !== "object") return;

        // 다이어그램 먼저 초기화되었는지 가드
        if (!window.myDiagram) {
            // 초기화가 아직이면 약간만 늦춰서 재시도
            setTimeout(() => window.dispatchEvent(new MessageEvent("message", { data })), 60);
            return;
        }

        if (data.type === "trigger-build-and-load") {
            try {
                await fetch(`${getAPIBase()}/api/build?company_id=${encodeURIComponent(companyId)}&task_id=${encodeURIComponent(taskId)}`, { method: "POST" });
                const combined = await fetchCombinedFromDB();
                await applyCombinedToScreen(combined);
            } catch (e) {
                console.error(e);
                alert("백엔드 빌드/로드 중 오류가 발생했습니다.");
            }
        }
        else if (data.type === "request-combined-json") {
            // 현재 화면 상태를 부모로 전달
            const combined = buildCombinedFromCurrentScreen();
            window.parent?.postMessage({ type: "combined-json", payload: combined }, "*");
        }
    });

    // 흐름도만 이미지로 저장하는 경로 생성
    window.getFlowPngDataUrl = () => myDiagram.makeImageData({ background: "white", scale: 2 });

    // 표+다이어그램+PII 전체를 PNG로 캡처
    window.captureWholePanelPng = async function (zoom = 1.0) {
        const root = document.querySelector(".frame");
        if (!root) throw new Error("캡쳐 루트(.frame)를 찾을 수 없습니다.");

        // 해상도(선명도) 설정
        const dpr = window.devicePixelRatio || 1;
        const TARGET_EXPORT_SCALE = 1;                 // 1.5~2 권장
        const canvasScale = TARGET_EXPORT_SCALE / dpr; // 브라우저 줌과 무관하게 선명도 고정

        // 원복용 상태 저장
        const html = document.documentElement;
        const body = document.body;
        const prevHtmlOverflow = html.style.overflow;
        const prevBodyOverflow = body.style.overflow;
        const prevScrollX = window.scrollX;
        const prevScrollY = window.scrollY;

        // 캡처 전에 textarea 자동 높이 보정
        if (typeof autosizeAllTextareas === "function") autosizeAllTextareas();
        // 레이아웃 반영 대기(rAF 2회가 안정적)
        await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));

        // 캡처 모드 진입(팔레트/모델박스 숨김, 한 줄 고정 등)
        html.classList.add("capture-mode");

        // 스케일 적용 전의 '자연 크기'
        const naturalWidth  = root.scrollWidth;
        const naturalHeight = root.scrollHeight;

        // 브라우저 렌더 스케일(줌 효과) 적용
        const prevTransform = root.style.transform;
        const prevTransformOrigin = root.style.transformOrigin;
        root.style.transformOrigin = "top left";
        root.style.transform = `scale(${zoom})`;

        // 스크롤/오버플로우 고정
        html.style.overflow = "hidden";
        body.style.overflow = "hidden";
        window.scrollTo(0, 0);

        try {
            const width  = Math.ceil(naturalWidth  * zoom);
            const height = Math.ceil(naturalHeight * zoom);

            const canvas = await html2canvas(root, {
                backgroundColor: "#ffffff",
                scale: canvasScale,     // 해상도(선명도)
                width,
                height,
                windowWidth:  width,    // 뷰포트를 컨텐츠 크기에 맞춤
                windowHeight: height,
                scrollX: 0,
                scrollY: 0,
                useCORS: true,
                removeContainer: true,

                // ✅ 복제 DOM에서 textarea → div로 교체(잘림 방지)
                onclone: (doc) => {
                    const frameClone = doc.querySelector(".frame");
                    if (!frameClone) return;

                    frameClone.querySelectorAll("textarea").forEach((ta) => {
                        const cs = doc.defaultView.getComputedStyle(ta);
                        const div = doc.createElement("div");

                        // 내용
                        div.textContent = ta.value;

                        // 크기/레이아웃: textarea가 보이던 그대로
                        const w = ta.clientWidth || parseFloat(cs.width) || 0;
                        const h = ta.scrollHeight || ta.clientHeight || 0;
                        div.style.width = w + "px";
                        div.style.minHeight = h + "px";
                        div.style.height = h + "px";

                        // 텍스트 렌더링 유사화
                        div.style.whiteSpace = "pre-wrap";
                        div.style.wordBreak = "break-word";
                        div.style.overflow = "visible";

                        // 주요 스타일 복제
                        div.style.font = cs.font || "";
                        div.style.lineHeight = cs.lineHeight || "";
                        div.style.padding = cs.padding || "";
                        div.style.border = cs.border || "none";
                        div.style.borderRadius = cs.borderRadius || "";
                        div.style.background = cs.backgroundColor || "transparent";
                        div.style.color = cs.color || "";

                        ta.parentNode.replaceChild(div, ta);
                    });
                },

                // (상황에 따라 도움이 될 수 있음)
                // foreignObjectRendering: true,
            });

            return canvas.toDataURL("image/png");
        } finally {
            // 원복
            root.style.transform = prevTransform;
            root.style.transformOrigin = prevTransformOrigin;
            html.classList.remove("capture-mode");
            html.style.overflow = prevHtmlOverflow;
            body.style.overflow = prevBodyOverflow;
            window.scrollTo(prevScrollX, prevScrollY);
        }
    };

    /* ========= 시작 ========= */
    window.addEventListener('DOMContentLoaded', () => {
        initDiagram();
        hookIO();

        const overlay  = document.getElementById('diagramOverlay');
        if (overlay) overlay.style.pointerEvents = 'auto';

        resizeOverlay();
        adjustFlowRowHeight();
        wireAutosizeAll();
        autosizeAllTextareas();
        window.addEventListener('resize', resizeOverlay);

        // PII 패널 초기행 하나 생성
        clearAllPIIRows();

        // 설명/우려사항/PII textarea 변경 시 자동 저장
        document.addEventListener("input", (ev) => {
            if (suppressAutosave) return;
            const target = ev.target;
            if (!(target instanceof HTMLElement)) return;

            const isTextArea = target instanceof HTMLTextAreaElement;
            const isEditableDiv = target.isContentEditable;

            if (!isTextArea && !isEditableDiv) return;

            if (
                target.closest(".desc-row") ||      // 단계 설명
                target.closest(".concern-row") ||   // 우려사항
                target.closest("#piiListScroll")    // 처리 개인정보(텍스트/label 모두)
            ) {
                scheduleAutosave();
            }
        });

        // 탭 진입 시 derived 자동 로드 시도
        tryInitialLoadFromDerived();
    });
</script>
</body>
</html>
